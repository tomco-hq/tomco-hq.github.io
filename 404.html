<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Page Not Found</title>
  <meta name="description" content="That page doesn't exist." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <nav class="nav">
      <a href="/index.html">Home</a>
      <a href="/about.html">About</a>
    </nav>

    <header>
      <h1>404</h1>
      <p class="tagline">That page wandered off.</p>
    </header>

    <section>
      <p>
        The link you followed is broken or the page has moved.
        Try heading <a href="/index.html">back to the home page</a>,
        or use the nav above.
      </p>
    </section>

    <footer>
      <p>&copy; <span id="year"></span> Your Name</p>
    </footer>
  </main>

  <script src="/script.js"></script>
</body>
</html>
